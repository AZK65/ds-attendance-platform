services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks:
      - default
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_GOOGLE_MAPS_KEY=AIzaSyBDiQ1sfqO8lzhuLXSxAjrBuI1VSFp0oWc
    expose:
      - "3000"
    shm_size: '1gb'
    volumes:
      # Persist SQLite database
      - app-data:/app/data
      # Persist WhatsApp session (so you don't re-scan QR every restart)
      - whatsapp-auth:/app/.wwebjs-auth
      - whatsapp-cache:/app/.wwebjs_cache
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - NEXT_PUBLIC_APP_URL=https://qazidrivingschool.ca
      - ZOOM_ACCOUNT_ID=${ZOOM_ACCOUNT_ID}
      - ZOOM_CLIENT_ID=${ZOOM_CLIENT_ID}
      - ZOOM_CLIENT_SECRET=${ZOOM_CLIENT_SECRET}
      - ZOOM_WEBHOOK_SECRET_TOKEN=${ZOOM_WEBHOOK_SECRET_TOKEN:-}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TEAMUP_API_KEY=${TEAMUP_API_KEY}
      - TEAMUP_CALENDAR_KEY=${TEAMUP_CALENDAR_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CLOVER_MERCHANT_ID=${CLOVER_MERCHANT_ID}
      - CLOVER_API_TOKEN=${CLOVER_API_TOKEN}
      - CLOVER_SANDBOX=${CLOVER_SANDBOX:-false}
      - NODE_ENV=production
      - TZ=America/Montreal
      - EXTERNAL_DB_HOST=mysqldb
      - EXTERNAL_DB_PORT=3306
      - EXTERNAL_DB_USER=root
      - EXTERNAL_DB_PASSWORD=driving123
      - EXTERNAL_DB_NAME=driving_school_v2
    networks:
      - default
      - drivingschoolapi_default
    restart: unless-stopped

volumes:
  app-data:
  whatsapp-auth:
  whatsapp-cache:
  caddy-data:
  caddy-config:

networks:
  drivingschoolapi_default:
    external: true
